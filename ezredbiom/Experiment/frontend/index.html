<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="api-base" content="http://localhost:5001/api">
  <title>Qiita Explorer</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="root"></div>
  <!-- Fallback: if app.compiled.js is missing, load Babel standalone and transpile at runtime -->
  <script>
    function loadBabelFallback() {
      var s1 = document.createElement('script');
      s1.src = 'https://unpkg.com/@babel/standalone/babel.min.js';
      s1.onload = function () {
        var s2 = document.createElement('script');
        s2.type = 'text/babel';
        s2.src = 'app.js';
        document.body.appendChild(s2);
      };
      document.head.appendChild(s1);
    }
  </script>
  <!-- app.compiled.js is generated by start_barnacle.sh -->
  <script src="app.compiled.js" onerror="loadBabelFallback()"></script>
</body>
</html>
