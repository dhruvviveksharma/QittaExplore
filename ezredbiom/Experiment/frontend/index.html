<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="api-base" content="http://localhost:5002/api">
  <title>Qiita Explorer</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="root"></div>
  <!--
    Local dev (VS Code Live Server) has no build step — Babel standalone transpiles
    app.js in the browser. The compiled artifact only exists on the barnacle host
    and is irrelevant to the browser-served frontend, so we don't probe for it.
  -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="js/utils.js"></script>
  <script type="text/babel" src="js/components.js"></script>
  <script type="text/babel" src="js/app_state.js"></script>
  <script type="text/babel" src="js/app_render.js"></script>
  <script type="text/babel" src="js/app.js"></script>
</body>
</html>
