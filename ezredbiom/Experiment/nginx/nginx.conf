# nginx config for ezredbiom on a single VM.
# Mounted into the nginx container at /etc/nginx/conf.d/default.conf.

upstream ezredbiom_app {
    server app:5001;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # Serve the compiled frontend.
    root /usr/share/nginx/html;
    index index.html;

    # Frontend assets: try the file, otherwise fall through to index.html
    # (single-page app behavior).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy → gunicorn.
    location /api/ {
        proxy_pass http://ezredbiom_app;
        proxy_http_version 1.1;

        # Streaming-friendly: don't buffer LLM responses.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Standard reverse-proxy headers.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # Reasonable upload ceiling for sample/prep template imports.
    client_max_body_size 50m;
}

