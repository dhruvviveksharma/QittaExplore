<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qiita Study Explorer</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0f172a;
            --blue: #3b82f6;
            --blue-light: #60a5fa;
            --cyan: #06b6d4;
            --bg: #f8fafc;
            --bg-alt: #f1f5f9;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --card-bg: #ffffff;
            --accent: #f59e0b;
            --success: #10b981;
            --shadow: rgba(15, 23, 42, 0.04);
            --shadow-md: rgba(15, 23, 42, 0.08);
            --shadow-lg: rgba(15, 23, 42, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        #root {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--navy) 0%, #1e40af 100%);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            margin-bottom: 2.5rem;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px var(--shadow-lg);
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, 30px); }
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.03em;
        }

        .subtitle {
            font-size: 1.25rem;
            opacity: 0.9;
            font-weight: 500;
        }

        /* Search Section */
        .search-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 4px 24px var(--shadow);
            border: 1px solid var(--border);
        }

        .search-box {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-family: 'Manrope', sans-serif;
            border: 2px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s ease;
            background: var(--bg);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: white;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1rem;
            font-family: 'Manrope', sans-serif;
            font-weight: 600;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover:not(:disabled) {
            background: var(--blue-light);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-alt);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: white;
            box-shadow: 0 4px 16px var(--shadow);
        }

        .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }

        .example-label {
            font-size: 0.875rem;
            color: var(--text-light);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
        }

        .example-tag {
            padding: 0.5rem 1rem;
            background: var(--bg);
            color: var(--text);
            border-radius: 8px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            font-weight: 500;
        }

        .example-tag:hover {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
            transform: translateY(-2px);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .stats-count {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--navy);
        }

        .stats-label {
            color: var(--text-light);
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* Grid Layout */
        .studies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        /* Study Card */
        .study-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.75rem;
            border: 1px solid var(--border);
            box-shadow: 0 2px 12px var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .study-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--blue);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .study-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px var(--shadow-md);
            border-color: var(--blue);
        }

        .study-card:hover::before {
            transform: scaleY(1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .study-id-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
            color: white;
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.02em;
        }

        .visibility-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .visibility-public { background: #dcfce7; color: #166534; }
        .visibility-private { background: #fee2e2; color: #991b1b; }
        .visibility-sandbox { background: #fef3c7; color: #92400e; }

        .study-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--navy);
            line-height: 1.4;
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .study-abstract {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-light);
            margin-bottom: 1.25rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.875rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text);
        }

        .meta-icon {
            font-size: 1rem;
            opacity: 0.7;
        }

        .meta-label {
            color: var(--text-light);
            font-weight: 500;
        }

        .card-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            flex: 1;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-light);
        }

        .spinner {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error */
        .error {
            background: #fef2f2;
            border: 2px solid #fecaca;
            color: #991b1b;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 2rem;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--card-bg);
            border-radius: 20px;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: linear-gradient(135deg, var(--navy) 0%, #1e40af 100%);
            color: white;
            border-radius: 20px 20px 0 0;
        }

        .modal-title {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }

        .modal-subtitle {
            font-size: 1rem;
            opacity: 0.9;
            font-family: 'JetBrains Mono', monospace;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            transition: all 0.2s ease;
            color: white;
            flex-shrink: 0;
            margin-left: 1rem;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 2rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .info-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-family: 'JetBrains Mono', monospace;
        }

        .info-value {
            font-size: 1rem;
            color: var(--navy);
            font-weight: 600;
        }

        .detail-section {
            margin-bottom: 2rem;
        }

        .detail-section:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .detail-value {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text);
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            padding: 0.4rem 0.9rem;
            background: linear-gradient(135deg, var(--blue) 0%, var(--cyan) 100%);
            color: white;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .tag-admin {
            background: linear-gradient(135deg, var(--accent) 0%, #ef4444 100%);
        }

        .tag-assigned {
            background: linear-gradient(135deg, var(--success) 0%, var(--cyan) 100%);
        }

        .publications-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .publication-item {
            padding: 1rem;
            background: var(--bg);
            border-radius: 8px;
            border-left: 3px solid var(--blue);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .publication-item a {
            color: var(--blue);
            text-decoration: none;
            font-weight: 600;
        }

        .publication-item a:hover {
            text-decoration: underline;
        }

        .data-types-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .data-type-badge {
            padding: 0.5rem 1rem;
            background: white;
            border: 2px solid var(--blue);
            color: var(--navy);
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        .artifacts-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .artifact-item {
            padding: 1rem;
            background: var(--bg);
            border-radius: 10px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .artifact-item:hover {
            border-color: var(--blue);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .artifact-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .artifact-name {
            font-weight: 600;
            color: var(--navy);
        }

        .artifact-meta {
            font-size: 0.875rem;
            color: var(--text-light);
            font-family: 'JetBrains Mono', monospace;
        }

        .pi-card {
            padding: 1.5rem;
            background: linear-gradient(135deg, var(--bg) 0%, white 100%);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .pi-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 0.5rem;
        }

        .pi-detail {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.35rem;
            color: var(--text);
        }

        .pi-icon {
            color: var(--blue);
            font-size: 0.9rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 6rem 2rem;
            background: var(--card-bg);
            border-radius: 20px;
            border: 2px dashed var(--border);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 0.5rem;
        }

        .empty-text {
            color: var(--text-light);
            font-size: 1.125rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .footer a {
            color: var(--blue);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: var(--blue-light);
        }

        @media (max-width: 768px) {
            #root {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .search-box {
                flex-direction: column;
            }

            .studies-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_BASE = 'http://localhost:5001/api';

        function App() {
            const [query, setQuery] = useState('');
            const [studies, setStudies] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searching, setSearching] = useState(false);
            const [error, setError] = useState(null);
            const [selectedStudy, setSelectedStudy] = useState(null);
            const [showModal, setShowModal] = useState(false);

            const exampleQueries = [
                "soil microbiome",
                "gut bacteria",
                "ocean samples",
                "Rob Knight",
                "UC San Diego"
            ];

            // Load initial studies on mount
            useEffect(() => {
                loadInitialStudies();
            }, []);

            const loadInitialStudies = async () => {
                setLoading(true);
                setError(null);
                
                try {
                    const response = await fetch(`${API_BASE}/studies?limit=50`);
                    
                    if (!response.ok) {
                        throw new Error('Failed to load studies');
                    }

                    const data = await response.json();
                    setStudies(data.results);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleSearch = async () => {
                if (!query.trim()) return;

                setSearching(true);
                setError(null);

                try {
                    const response = await fetch(`${API_BASE}/search`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ query })
                    });

                    if (!response.ok) {
                        throw new Error('Search failed');
                    }

                    const data = await response.json();
                    setStudies(data.results);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setSearching(false);
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') {
                    handleSearch();
                }
            };

            const openStudyDetails = async (studyId) => {
                try {
                    // const response = await fetch(`${API_BASE}/study/${studyId}`);
                    const response = await fetch(`https://localhost:21174/api/v1/${studyId}`);
                    
                    if (!response.ok) {
                        throw new Error('Failed to load study details');
                    }

                    const data = await response.json();
                    setSelectedStudy(data);
                    setShowModal(true);
                } catch (err) {
                    alert(`Error: ${err.message}`);
                }
            };

            const downloadStudyData = (studyId) => {
                window.open(`${API_BASE}/study/${studyId}/download`, '_blank');
            };

            return (
                <>
                    <div className="header">
                        <div className="header-content">
                            <h1>Qiita Study Explorer</h1>
                            <p className="subtitle">Discover and analyze microbiome research</p>
                        </div>
                    </div>

                    <div className="search-section">
                        <div className="search-box">
                            <input
                                type="text"
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                                onKeyPress={handleKeyPress}
                                placeholder="Search studies by keywords, author, or topic..."
                            />
                            <button 
                                className="btn" 
                                onClick={handleSearch} 
                                disabled={searching || !query.trim()}
                            >
                                {searching ? '⏳ Searching...' : '🔍 Search'}
                            </button>
                            <button 
                                className="btn btn-secondary" 
                                onClick={loadInitialStudies}
                                disabled={loading}
                            >
                                ↻ Reset
                            </button>
                        </div>

                        <div className="examples">
                            <span className="example-label">Quick search:</span>
                            {exampleQueries.map((example, idx) => (
                                <span
                                    key={idx}
                                    className="example-tag"
                                    onClick={() => setQuery(example)}
                                >
                                    {example}
                                </span>
                            ))}
                        </div>
                    </div>

                    {error && (
                        <div className="error">
                            <span style={{fontSize: '1.5rem'}}>⚠️</span>
                            <div>
                                <strong>Error:</strong> {error}
                            </div>
                        </div>
                    )}

                    {loading ? (
                        <div className="loading">
                            <div className="spinner"></div>
                            <p>Loading studies...</p>
                        </div>
                    ) : studies.length > 0 ? (
                        <>
                            <div className="stats-bar">
                                <div>
                                    <div className="stats-count">{studies.length}</div>
                                    <div className="stats-label">Studies found</div>
                                </div>
                            </div>

                            <div className="studies-grid">
                                {studies.map((study, idx) => (
                                    <div key={idx} className="study-card">
                                        <div className="card-header">
                                            <span className="study-id-badge">
                                                ID {study.study_id}
                                            </span>
                                            {study.visibility && (
                                                <span className={`visibility-badge visibility-${study.visibility}`}>
                                                    {study.visibility}
                                                </span>
                                            )}
                                        </div>

                                        <h3 className="study-title">{study.study_title}</h3>
                                        
                                        <p className="study-abstract">
                                            {study.study_abstract || 'No abstract available.'}
                                        </p>

                                        <div className="card-meta">
                                            {study.pi_name && (
                                                <div className="meta-item">
                                                    <span className="meta-icon">👤</span>
                                                    <span><span className="meta-label">PI:</span> {study.pi_name}</span>
                                                </div>
                                            )}
                                            {study.pi_affiliation && (
                                                <div className="meta-item">
                                                    <span className="meta-icon">🏛️</span>
                                                    <span>{study.pi_affiliation}</span>
                                                </div>
                                            )}
                                            {study.artifact_count > 0 && (
                                                <div className="meta-item">
                                                    <span className="meta-icon">📊</span>
                                                    <span>{study.artifact_count} artifacts</span>
                                                </div>
                                            )}
                                        </div>

                                        <div className="card-actions">
                                            <button 
                                                className="btn btn-small"
                                                onClick={() => openStudyDetails(study.study_id)}
                                            >
                                                View Details
                                            </button>
                                            <button 
                                                className="btn btn-secondary btn-small"
                                                onClick={() => downloadStudyData(study.study_id)}
                                            >
                                                📥 Download
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    ) : (
                        <div className="empty-state">
                            <div className="empty-icon">🔬</div>
                            <h3 className="empty-title">No studies found</h3>
                            <p className="empty-text">Try adjusting your search or browse all studies</p>
                        </div>
                    )}

                    {showModal && selectedStudy && (
                        <div className="modal-overlay" onClick={() => setShowModal(false)}>
                            <div className="modal" onClick={(e) => e.stopPropagation()}>
                                <div className="modal-header">
                                    <div style={{flex: 1}}>
                                        <div className="modal-title">{selectedStudy.study_title}</div>
                                        <div className="modal-subtitle">
                                            Study ID: {selectedStudy.study_id} 
                                            {selectedStudy.ebi_study_accession && ` • ${selectedStudy.ebi_study_accession}`}
                                        </div>
                                    </div>
                                    <button className="close-btn" onClick={() => setShowModal(false)}>
                                        ×
                                    </button>
                                </div>

                                <div className="modal-body">
                                    {/* Quick Info Grid */}
                                    <div className="info-grid">
                                        {selectedStudy.sample_count && (
                                            <div className="info-item">
                                                <div className="info-label">Samples</div>
                                                <div className="info-value">{selectedStudy.sample_count}</div>
                                            </div>
                                        )}
                                        {selectedStudy.artifacts && (
                                            <div className="info-item">
                                                <div className="info-label">Artifacts</div>
                                                <div className="info-value">{selectedStudy.artifacts.length}</div>
                                            </div>
                                        )}
                                        {selectedStudy.ebi_submission_status && (
                                            <div className="info-item">
                                                <div className="info-label">EBI Status</div>
                                                <div className="info-value">{selectedStudy.ebi_submission_status}</div>
                                            </div>
                                        )}
                                        {selectedStudy.shared_with && selectedStudy.shared_with.length > 0 && (
                                            <div className="info-item">
                                                <div className="info-label">Shared With</div>
                                                <div className="info-value">{selectedStudy.shared_with.length} users</div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Abstract */}
                                    <div className="detail-section">
                                        <div className="detail-label">📄 Abstract</div>
                                        <div className="detail-value">
                                            {selectedStudy.study_abstract || 'No abstract available.'}
                                        </div>
                                    </div>

                                    {/* Study Tags */}
                                    {selectedStudy.tags && selectedStudy.tags.length > 0 && (
                                        <div className="detail-section">
                                            <div className="detail-label">🏷️ Study Tags</div>
                                            <div className="tags-container">
                                                {selectedStudy.tags.map((tag, idx) => {
                                                    const isAdmin = tag.toLowerCase().includes('admin');
                                                    const isAssigned = tag.toLowerCase().includes('assigned');
                                                    const className = isAdmin ? 'tag tag-admin' : isAssigned ? 'tag tag-assigned' : 'tag';
                                                    return <span key={idx} className={className}>{tag}</span>;
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    {/* Principal Investigator */}
                                    {selectedStudy.pi_name && (
                                        <div className="detail-section">
                                            <div className="detail-label">👤 Principal Investigator</div>
                                            <div className="pi-card">
                                                <div className="pi-name">{selectedStudy.pi_name}</div>
                                                {selectedStudy.pi_affiliation && (
                                                    <div className="pi-detail">
                                                        <span className="pi-icon">🏛️</span>
                                                        <span>{selectedStudy.pi_affiliation}</span>
                                                    </div>
                                                )}
                                                {selectedStudy.pi_email && (
                                                    <div className="pi-detail">
                                                        <span className="pi-icon">📧</span>
                                                        <span>{selectedStudy.pi_email}</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}

                                    {/* Lab Person */}
                                    {selectedStudy.lab_person && selectedStudy.lab_person.name && (
                                        <div className="detail-section">
                                            <div className="detail-label">👥 Lab Contact</div>
                                            <div className="detail-value">
                                                <strong>{selectedStudy.lab_person.name}</strong>
                                                {selectedStudy.lab_person.affiliation && <><br/>{selectedStudy.lab_person.affiliation}</>}
                                                {selectedStudy.lab_person.email && <><br/>📧 {selectedStudy.lab_person.email}</>}
                                            </div>
                                        </div>
                                    )}

                                    {/* Publications */}
                                    {selectedStudy.publications && selectedStudy.publications.length > 0 && (
                                        <div className="detail-section">
                                            <div className="detail-label">📚 Publications</div>
                                            <div className="publications-list">
                                                {selectedStudy.publications.map((pub, idx) => (
                                                    <div key={idx} className="publication-item">
                                                        {pub.doi && (
                                                            <div>
                                                                DOI: <a href={`https://doi.org/${pub.doi}`} target="_blank" rel="noopener noreferrer">
                                                                    {pub.doi}
                                                                </a>
                                                            </div>
                                                        )}
                                                        {pub.pubmed_id && (
                                                            <div>
                                                                PubMed: <a href={`https://pubmed.ncbi.nlm.nih.gov/${pub.pubmed_id}`} target="_blank" rel="noopener noreferrer">
                                                                    {pub.pubmed_id}
                                                                </a>
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Data Types */}
                                    {selectedStudy.data_types && selectedStudy.data_types.length > 0 && (
                                        <div className="detail-section">
                                            <div className="detail-label">🔬 Data Types</div>
                                            <div className="data-types-list">
                                                {selectedStudy.data_types.map((dataType, idx) => (
                                                    <span key={idx} className="data-type-badge">{dataType}</span>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Sample Categories */}
                                    {selectedStudy.sample_categories && selectedStudy.sample_categories.length > 0 && (
                                        <div className="detail-section">
                                            <div className="detail-label">📋 Sample Metadata Categories</div>
                                            <div className="detail-value">
                                                {selectedStudy.sample_categories.join(', ')}
                                            </div>
                                        </div>
                                    )}

                                    {/* Artifacts */}
                                    {selectedStudy.artifacts && selectedStudy.artifacts.length > 0 && (
                                        <div className="detail-section">
                                            <div className="detail-label">📊 Artifacts ({selectedStudy.artifacts.length})</div>
                                            <div className="artifacts-list">
                                                {selectedStudy.artifacts.map((artifact, idx) => (
                                                    <div key={idx} className="artifact-item">
                                                        <div className="artifact-info">
                                                            <div className="artifact-name">
                                                                {artifact.name || `Artifact ${artifact.artifact_id}`}
                                                            </div>
                                                            <div className="artifact-meta">
                                                                Type: {artifact.artifact_type} • ID: {artifact.artifact_id}
                                                                {artifact.prep_count > 0 && ` • ${artifact.prep_count} prep template(s)`}
                                                            </div>
                                                        </div>
                                                        <span className={`visibility-badge visibility-${artifact.visibility}`}>
                                                            {artifact.visibility}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Download Button */}
                                    <div style={{marginTop: '2rem', paddingTop: '2rem', borderTop: `1px solid var(--border)`}}>
                                        <button 
                                            className="btn"
                                            onClick={() => downloadStudyData(selectedStudy.study_id)}
                                            style={{width: '100%'}}
                                        >
                                            📥 Download All Study Data & Metadata (ZIP)
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="footer">
                        Powered by <a href="https://github.com/qiita-spots/qiita" target="_blank" rel="noopener noreferrer">Qiita</a> microbiome database
                    </div>
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
