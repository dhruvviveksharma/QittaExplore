# TODO-back-to-master: Change port back to 5001 before merging to master
upstream flask_app {
    server 127.0.0.1:5002;
    keepalive 32;
}

server {
    listen 8080;

    gzip on;
    gzip_types application/json text/event-stream text/plain;
    gzip_min_length 1024;

    # SSE streams and regular API calls
    location /api/ {
        proxy_pass         http://flask_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # Required for SSE — disable nginx buffering so tokens stream through immediately
        proxy_buffering        off;
        proxy_request_buffering off;
        proxy_read_timeout     120s;
        proxy_connect_timeout  10s;

        # Let gunicorn's X-Accel-Buffering header take effect
        proxy_pass_header  X-Accel-Buffering;
    }

    # Static frontend files
    location / {
        root   /path/to/ezredbiom/Experiment/frontend;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }
}
