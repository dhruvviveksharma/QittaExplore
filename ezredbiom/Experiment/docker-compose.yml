# ezredbiom production stack — single-VM deployment.
#
# Run from the repo root:
#   docker compose -f ezredbiom/Experiment/docker-compose.yml build
#   docker compose -f ezredbiom/Experiment/docker-compose.yml up -d
#
# Build context is the repo root so the Dockerfile can COPY both
# ezredbiom/Experiment/* and (if ever needed) top-level files.

services:
  app:
    build:
      context: ../../          # repo root
      dockerfile: ezredbiom/Experiment/Dockerfile
    image: ezredbiom:latest
    container_name: ezredbiom-app
    env_file:
      - .env
    environment:
      QIITA_CONFIG_FP: /etc/qiita/qiita_config.cfg
      QIITA_EXPERIMENT_DB_PATH: /var/lib/ezredbiom/projects.db
    volumes:
      # Persist the SQLite project store across restarts.
      - ezredbiom_data:/var/lib/ezredbiom
      # Lab-supplied Qiita config — bind-mounted, read-only.
      - ./secrets/qiita_config.cfg:/etc/qiita/qiita_config.cfg:ro
      # Share the compiled frontend with the nginx container.
      - frontend_static:/app/frontend
    # No port published — only nginx talks to the app over the compose network.
    expose:
      - "5001"
    restart: unless-stopped
    networks:
      - ezredbiom-net

  nginx:
    image: nginx:1.27-alpine
    container_name: ezredbiom-nginx
    depends_on:
      - app
    ports:
      - "80:80"
      # 443 reserved for the future TLS step (uncomment nginx.conf block too).
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_static:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - ezredbiom-net

volumes:
  ezredbiom_data:
  frontend_static:

networks:
  ezredbiom-net:
    driver: bridge
