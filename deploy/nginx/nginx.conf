user  nginx;
worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    upstream flask_app {
        server 127.0.0.1:5001;
        keepalive 32;
    }

    server {
        listen 8081;
        server_name qiita-explore.knight-lab-dev.org localhost;

        gzip on;
        gzip_types application/json text/event-stream text/plain text/css application/javascript;
        gzip_min_length 1024;

        location /api/ {
            proxy_pass         http://flask_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE streaming: disable nginx buffering so tokens flow through
            proxy_buffering        off;
            proxy_request_buffering off;
            proxy_read_timeout     300s;
            proxy_send_timeout     300s;
            proxy_connect_timeout  10s;
            proxy_pass_header  X-Accel-Buffering;
        }

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
